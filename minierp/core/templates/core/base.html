<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniERP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }
        header {
            background: #1f3c88;
            color: white;
            padding: 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }
        main {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .field-container {
            margin-bottom: 16px;
        }
        .field-container label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .field-container input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .helptext {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 0.9em;
        }
        .errorlist {
            margin: 8px 0 0 0;
            padding-left: 18px;
            color: #c62828;
        }
        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #162d66;
        }
        .menu {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>MiniERP</h1>
        <nav>
            <a href="{% url 'home' %}">Inicio</a>
            <a href="{% url 'producto_add' %}">Alta producto</a>
            <a href="{% url 'cliente_add' %}">Alta cliente</a>
            <a href="{% url 'crm_dashboard' %}">Dashboard CRM</a>
            <a href="{% url 'api_productos' %}">API productos</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
